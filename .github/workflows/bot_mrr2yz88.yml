name: Branch Picker Router
on:
  push:
  workflow_dispatch:
jobs:
  get-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and Build Branch Menu
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Fetch all remote branches and clean up the string output
          BRANCH_LIST=$(git branch -r | grep -v 'HEAD' | sed 's/color=.*//g' | sed 's|[[:space:]]*origin/||g')
          
          # Build out the inline keyboard JSON structure dynamically
          KEYBOARD_JSON="{\"inline_keyboard\": ["
          FIRST=true
          
          for BRANCH in $BRANCH_LIST; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              KEYBOARD_JSON="${KEYBOARD_JSON}, "
            fi
            # Add a button for each branch that sends its name back as callback data
            KEYBOARD_JSON="${KEYBOARD_JSON}[{\"text\": \"🌿 Branch: $BRANCH\", \"callback_data\": \"select_branch:$BRANCH\"}]"
          done
          
          KEYBOARD_JSON="${KEYBOARD_JSON}]}"
          
          MSG="🌿 *Active Repository Branches Found* %0A%0ASelect a branch below to switch your sandbox context:"
          
          # Send the interactive menu to Telegram
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD_JSON}"