name: Random Drive Broadcast
on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: 'The Google Drive folder ID'
        required: true
        default: '1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn'
      caption:
        description: 'Caption text'
        required: false
        default: '🎲 *Random Image Pulled From Your Drive Folder*'
      button_text:
        description: 'Button Label'
        required: false
        default: '🔗 Open Target Link'
      button_url:
        description: 'Button Target URL'
        required: false
        default: 'https://github.com/quickerup'

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Folder Contents and Pick Random Media
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOLDER_ID: ${{ github.event.inputs.folder_id }}
          CAPTION: ${{ github.event.inputs.caption }}
          B_TEXT: ${{ github.event.inputs.button_text }}
          B_URL: ${{ github.event.inputs.button_url }}
        run: |
          echo "Scanning public Google Drive directory..."
          
          # 1. Query the public Google Drive folder using the Drive v3 API endpoint
          QUERY_URL="https://www.googleapis.com/drive/v3/files?q=%27${FOLDER_ID}%27+in+parents+and+mimeType+contains+%27image%27+and+trashed=false&pageSize=100&fields=files(id)"
          RESPONSE=$(curl -s "$QUERY_URL")
          
          # 2. Extract all the file IDs into a clean list using jq
          FILE_IDS=$(echo "$RESPONSE" | jq -r '.files[].id' 2>/dev/null)
          
          if [ -z "$FILE_IDS" ] || [ "$FILE_IDS" == "null" ]; then
            echo "❌ Error: No files found or folder access restriction encountered. Ensure folder sharing is set to 'Anyone with the link'."
            exit 1
          fi
          
          # 3. Pick exactly one random file ID from the array using shuf
          RANDOM_FILE_ID=$(echo "$FILE_IDS" | shuf -n 1)
          echo "Selected File ID target: $RANDOM_FILE_ID"
          
          # 4. Construct the direct raw image URL structure for Telegram to download
          FINAL_IMAGE_URL="https://drive.google.com/uc?export=download&id=${RANDOM_FILE_ID}"
          
          # 5. Compile the Telegram layout parameters
          KEYBOARD=$(jq -n --arg txt "$B_TEXT" --arg url "$B_URL" '[[{"text": $txt, "url": $url}]]')
          PAYLOAD=$(jq -n \
            --arg chat "$CHAT_ID" \
            --arg photo "$FINAL_IMAGE_URL" \
            --arg caption "$CAPTION" \
            --argjson kb "$KEYBOARD" \
            '{chat_id: $chat, photo: $photo, caption: $caption, parse_mode: "Markdown", reply_markup: { inline_keyboard: $kb }}')
          
          # 6. Fire the payload container directly to Telegram
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"