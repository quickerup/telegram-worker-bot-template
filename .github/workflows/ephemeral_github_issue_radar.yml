name: Ephemeral GitHub Issue Radar
on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Ephemeral Issue Scan
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "## 🚨 EPHEMERAL GITHUB ISSUE RADAR"
          echo "Scanned at $(date -u)"
          echo ""
          
          echo "Fetching latest open issues..."
          gh issue list --limit 25 --state open --json repository,nameWithOwner,url,title,createdAt --jq '
            .[] | "[\(.nameWithOwner)](\(.url)): [\(.title)] • Created: \(.createdAt)"
          ' || echo "⚠️ No issues found or access issue with PAT."
          
          echo ""
          echo "✅ Scan complete. Ephemeral — no files left behind."