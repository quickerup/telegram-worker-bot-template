name: Ephemeral GitHub Issue Radar
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
jobs:
  scan-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Scan issues
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X GET \
          https://api.github.com/search/issues?q=state:open&per_page=20 \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" > issues.json
          jq -r '.items[] | "\(.repository.name) | \(.title) | https://github.com/\(.repository.full_name)/issues/\(.number) | \((now - .created_at) / 86400 | floor) days"' issues.json > issues.md
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"