name: Ephemeral GitHub Issue Radar
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  scan-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - name: Scan for open issues
        env:
          GITHUB_TOKEN: ${{ secrets.GHPAT }}
        run: |
          curl -s -X GET \
          https://api.github.com/search/issues?q=state:open&per_page=20 \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" > issues.json

      - name: Parse issues and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "| Repo | Issue Title | Link | Age |" > summary.md
          echo "| --- | --- | --- | --- |" >> summary.md
          jq -r '.items[] | ".repo: " + .repository_url + " | " + .title + " | https://github.com/" + .repository_url + "/issues/" + (.number|tostring) + " | " + (.created_at | sub("T.*"; "") | sub("Z"; "") | fromdate | tostring("d"))' issues.json >> summary.md
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"$(cat summary.md)\", \"parse_mode\": \"Markdown\"}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Workflow failed: ${{ github.workflow }}\"}"