name: List Actions

on:
  workflow_dispatch:

jobs:
  list-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch workflows and send as buttons
        env:
          GH_TOKEN: ${{ secrets.GHPAT }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"

          # Fetch all workflow files with their IDs and names
          WORKFLOWS=$(gh api "repos/$REPO/actions/workflows" --jq '.workflows[] | select(.state == "active") | {id: .id, name: .name, path: .path}')

          if [ -z "$WORKFLOWS" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"No active workflows found.\"}"
            exit 0
          fi

          # Build an inline keyboard — one row per workflow: [Name] [▶ Run] [🗑 Delete]
          ROWS="[]"
          while IFS= read -r wf; do
            ID=$(echo "$wf" | jq -r '.id')
            NAME=$(echo "$wf" | jq -r '.name')
            FILE=$(echo "$wf" | jq -r '.path | split("/") | last')
            ROWS=$(echo "$ROWS" | jq \
              --arg name "$NAME" \
              --arg run_cb "trig:${REPO}:${FILE}" \
              --arg del_cb "del:${REPO}:${FILE}" \
              '. += [[{"text": $name, "callback_data": $run_cb}, {"text": "🗑", "callback_data": $del_cb}]]'
            )
          done < <(echo "$WORKFLOWS" | jq -c '.')

          PAYLOAD=$(jq -n \
            --arg chat "$CHAT_ID" \
            --argjson kb "$ROWS" \
            '{chat_id: $chat, text: "🗂 *Active Workflows* — tap to run, 🗑 to delete:", parse_mode: "Markdown", reply_markup: {inline_keyboard: $kb}}')

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
