name: Telegram Bot Generator Factory
on:
  push:
  workflow_dispatch:
    inputs:
      bot_name:
        description: 'Name of the new layout config'
        required: true
        default: 'custom-bitcoin-tweak'
jobs:
  forge-bot-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          # This swaps out the standard token for your custom token with workflow bypass authority
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Generate New Workflow Mapping
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEW_BOT_NAME: ${{ github.event.inputs.bot_name }}
        run: |
          CLEAN_NAME="${NEW_BOT_NAME:-generated-ticker}"
          FILENAME=".github/workflows/gen-${CLEAN_NAME}.yml"
          
          git config --global user.name "factory-bot"
          git config --global user.email "factory@bot.internal"

          cat << 'EOF' > "$FILENAME"
          name: Dynamic Bitcoin Dashboard
          on:
            push:
            workflow_dispatch:
          jobs:
            fetch-price:
              runs-on: ubuntu-latest
              steps:
                - name: Pull Market Data & Format Message
                  env:
                    BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                    CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  run: |
                    RESPONSE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true")
                    PRICE=$(echo "$RESPONSE" | jq -r '.bitcoin.usd')
                    CHANGE=$(echo "$RESPONSE" | jq -r '.bitcoin.usd_24h_change')
                    FORMATTED_PRICE=$(printf "%'d" "${PRICE%.*}")
                    
                    if (( $(echo "$CHANGE > 0" | bc -l) )); then
                      TREND="📈 Up"
                      ARROW="🟢"
                    else
                      TREND="📉 Down"
                      ARROW="🔴"
                    fi
                    FORMATTED_CHANGE=$(printf "%.2f" "$CHANGE")
                    
                    MSG="🪙 *Forged Node: Live Bitcoin Feed* %0A%0A*Price:* \$$FORMATTED_PRICE USD %0A*Trend:* $TREND %0A*Change:* ${ARROW} ${FORMATTED_CHANGE}%"
                    KEYBOARD="{\"inline_keyboard\": [[{\"text\": \"🔄 Refresh Forged Ticker\", \"callback_data\": \"refresh_btc\"}]]}"
                    
                    curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                      -d "chat_id=${CHAT_ID}" \
                      -d "text=${MSG}" \
                      -d "parse_mode=Markdown" \
                      --data-urlencode "reply_markup=${KEYBOARD}"
          EOF

          git add "$FILENAME"
          git commit -m "🤖 Factory: Generated new workflow (${CLEAN_NAME})"
          git push origin main

          MSG="🤖 *Bot Factory Engine Live* %0A%0ASuccessfully forged and mapped a new automated dashboard! %0A%0A*File:* \$FILENAME\"
          KEYBOARD_JSON="{\"inline_keyboard\": [[{\"text\": \"🚀 Trigger Forged Workflow\", \"callback_data\": \"forge_trigger:${CLEAN_NAME}\"}]]}"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD_JSON}"