name: Network Route Trace
on:
  workflow_dispatch:
jobs:
  trace:
    runs-on: ubuntu-latest
    steps:
      - name: Install Network Tools
        run: sudo apt-get update && sudo apt-get install -y traceroute

      - name: Run Diagnostics and Ping Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKER_URL: ${{ secrets.TELEGRAM_WORKER_URL }}
        run: |
          # Clean up the worker URL to get a raw domain/IP
          CLEAN_DOMAIN=$(echo "$WORKER_URL" | sed -e 's|^[^/]*//' -e 's|/.*' -e 's|:.*||')
          
          echo "🌐 Tracing path to Worker: $CLEAN_DOMAIN"
          echo "🛰️ Tracing path to Telegram API: api.telegram.org"
          
          # Execute traceroutes with a 15-hop limit, skipping DNS lookups for speed
          WORKER_TRACE=$(traceroute -m 15 -n "$CLEAN_DOMAIN" 2>&1 || echo "Worker trace failed")
          TG_TRACE=$(traceroute -m 15 -n api.telegram.org 2>&1 || echo "Telegram trace failed")
          
          # Construct the Telegram payload safely
          TEXT_PAYLOAD="🛰️ *Network Diagnostic Trace Complete*

*Worker Route ($CLEAN_DOMAIN):*
\\\
$WORKER_TRACE
\\\

*Telegram API Route:*
\\\
$TG_TRACE
\\\"

          # Send it over the wire
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=$TEXT_PAYLOAD" \
            --data-urlencode "parse_mode=Markdown"