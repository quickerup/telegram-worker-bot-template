name: Telegram Worker Bot Template Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  monitor-task:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check bot status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X GET "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe"

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Workflow failed: ${{ github.workflow }}\"}"

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 ${{ github.workflow }} failed" \
            --body "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"