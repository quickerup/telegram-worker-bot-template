name: Image Only Endless Loop
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Image Script File
        run: |
          cat << 'EOF' > script.js
          async function run() {
            try {
              const response = await fetch("https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn");
              const html = await response.text();
              const regex = /"([1][a-zA-Z0-9_-]{32})"/g;
              
              let match;
              const uniqueIds = new Set();
              while ((match = regex.exec(html)) !== null) {
                if (match[1] !== '1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn') {
                  uniqueIds.add(match[1]);
                }
              }
              
              const idsArray = Array.from(uniqueIds);
              if (idsArray.length === 0) {
                console.error("❌ Error: Could not parse any asset IDs.");
                process.exit(1);
              }
              
              let success = false;
              let attempts = 0;
              
              // Loop until we successfully send an image (max 10 attempts to avoid infinite loops)
              while (!success && attempts < 10) {
                attempts++;
                const randomId = idsArray[Math.floor(Math.random() * idsArray.length)];
                const downloadUrl = "https://drive.google.com/uc?export=download&id=" + randomId;
                
                const payload = {
                  chat_id: process.env.CHAT_ID,
                  photo: downloadUrl,
                  caption: "❤️🤸🏻‍♀️ *You love this shit*",
                  parse_mode: "Markdown",
                  reply_markup: {
                    inline_keyboard: [[{ text: "🔄 Next Image", callback_data: "trigger_image_loop" }]]
                  }
                };
                
                const res = await fetch("https://api.telegram.org/bot" + process.env.BOT_TOKEN + "/sendPhoto", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                  success = true;
                  console.log("🚀 Image pushed successfully.");
                } else {
                  console.log(`⚠️ Attempt ${attempts} failed (likely not a valid image):`, await res.text());
                }
              }
              
              if (!success) {
                console.error("❌ Failed to find and send a valid image after 10 attempts.");
                process.exit(1);
              }
            } catch (err) {
              console.error("❌ Fault:", err);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Run Safe Node Script File
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js
