name: Main
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="https://drive.google.com/uc?export=download&id=1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z"
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendDocument" \
            -d "chat_id=$CHAT" \
            -d "document=$URL" \
            -d "caption=Started Fresh" \
            -d 'reply_markup={"inline_keyboard": [[{"text": "🔄 Next", "callback_data": "/trigger main.yml main"}]]}')
          
          # Check if Telegram returned ok: true
          if ! echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "❌ Telegram API Error:"
            echo "$RESPONSE" | jq .
            exit 1
          fi