name: Main
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendDocument \
          -d chat_id=$CHAT -d document="https://drive.google.com/uc?export=download&id=1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z" \
          -d caption="System Ready"