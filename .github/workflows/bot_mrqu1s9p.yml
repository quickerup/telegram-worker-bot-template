name: Update Bot Menu Layout
on:
  workflow_dispatch:
jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Update Menu Layout
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: 7952819982
          WORKFLOW_ID: bot_mrqsyvf2.yml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setChatMenuButton" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "${CHAT_ID}", "menu_button": {"type": "commands"}}'
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "${CHAT_ID}", "text": "Menu updated", "reply_markup": {"inline_keyboard": [[{"text": " Fuck yeah it worked", "callback_data": "trigger_workflow"}]]}}