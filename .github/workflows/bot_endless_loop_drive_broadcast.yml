name: Endless Loop Drive Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Separate Node Script File
        run: |
          cat << 'EOF' > script.js
          const FOLDER_URL = "https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn";

          function shuffle(items) {
            return items
              .map((value) => ({ value, sort: Math.random() }))
              .sort((a, b) => a.sort - b.sort)
              .map(({ value }) => value);
          }

          function filenameFor(contentType, id) {
            const subtype = (contentType.split("/")[1] || "bin").split(";")[0];
            return `drive-${id}.${subtype === "jpeg" ? "jpg" : subtype}`;
          }

          async function fetchDriveMedia(id) {
            const urls = [
              `https://drive.google.com/thumbnail?id=${id}&sz=w1600`,
              `https://drive.google.com/uc?export=download&id=${id}`
            ];

            for (const url of urls) {
              const response = await fetch(url, { redirect: "follow" });
              const contentType = response.headers.get("content-type") || "";

              if (!response.ok || !(contentType.startsWith("image/") || contentType.startsWith("video/"))) {
                console.warn(`Skipping ${id}: ${response.status} ${contentType || "unknown content type"}`);
                continue;
              }

              const bytes = await response.arrayBuffer();
              if (!bytes.byteLength) {
                console.warn(`Skipping ${id}: empty media response`);
                continue;
              }

              return { bytes, contentType, url };
            }

            return null;
          }

          async function sendTelegramMedia(id, media) {
            const isVideo = media.contentType.startsWith("video/");
            const endpoint = isVideo ? "sendVideo" : "sendPhoto";
            const fieldName = isVideo ? "video" : "photo";
            const form = new FormData();

            form.append("chat_id", process.env.CHAT_ID);
            form.append(fieldName, new Blob([media.bytes], { type: media.contentType }), filenameFor(media.contentType, id));
            form.append("caption", "🎲 *Random Media Pulled From Your Drive Folder*");
            form.append("parse_mode", "Markdown");
            form.append("reply_markup", JSON.stringify({
              inline_keyboard: [
                [
                  { text: "🔗 View Target Source", url: media.url },
                  { text: "🔄 Next Random Media", callback_data: "trigger_loop" }
                ]
              ]
            }));

            return fetch(`https://api.telegram.org/bot${process.env.BOT_TOKEN}/${endpoint}`, {
              method: "POST",
              body: form
            });
          }

          async function run() {
            try {
              const response = await fetch(FOLDER_URL);
              const html = await response.text();
              const matches = html.match(/[a-zA-Z0-9_-]{25,}/g);

              if (!matches || matches.length === 0) {
                console.error("❌ Error: Could not parse any asset IDs from the folder view.");
                process.exit(1);
              }

              const candidateIds = shuffle([...new Set(matches)]);
              console.log(`Found ${candidateIds.length} candidate Drive asset IDs.`);

              for (const id of candidateIds) {
                console.log(`Selected multi-media asset pointer ID: ${id}`);
                const media = await fetchDriveMedia(id);
                if (!media) {
                  continue;
                }

                const res = await sendTelegramMedia(id, media);
                if (!res.ok) {
                  const errText = await res.text();
                  console.error("❌ Telegram API transaction rejected:", errText);
                  continue;
                }

                console.log("🚀 Payload successfully pushed to chat frame UI.");
                return;
              }

              console.error("❌ Error: None of the parsed Drive asset IDs resolved to downloadable image/video content.");
              process.exit(1);
            } catch (err) {
              console.error("❌ Fatal loop engine execution fault:", err);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Run Safe Node Script File
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js