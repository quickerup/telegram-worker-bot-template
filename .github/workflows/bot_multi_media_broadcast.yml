name: Multi-Media Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Multi-Media Script File
        run: |
          cat << 'NODE' > script.js
          const folderId = process.env.FOLDER_ID || "1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z";
          const repo = process.env.GITHUB_REPOSITORY || "quickerup/telegram-worker-bot-template";

          function shuffle(items) {
            return items
              .map((value) => ({ value, sort: Math.random() }))
              .sort((a, b) => a.sort - b.sort)
              .map(({ value }) => value);
          }

          function filenameFor(contentType, id) {
            const subtype = (contentType.split("/")[1] || "bin").split(";")[0];
            return `drive-${id}.${subtype === "jpeg" ? "jpg" : subtype}`;
          }

          async function fetchDriveMedia(id) {
            const urls = [
              `https://drive.google.com/thumbnail?id=${id}&sz=w1600`,
              `https://drive.google.com/uc?export=download&id=${id}`
            ];

            for (const url of urls) {
              const response = await fetch(url, { redirect: "follow" });
              const contentType = response.headers.get("content-type") || "";

              if (!response.ok || !(contentType.startsWith("image/") || contentType.startsWith("video/"))) {
                console.warn(`Skipping ${id}: ${response.status} ${contentType || "unknown content type"}`);
                continue;
              }

              const bytes = await response.arrayBuffer();
              if (!bytes.byteLength) {
                console.warn(`Skipping ${id}: empty media response`);
                continue;
              }

              return { bytes, contentType, url };
            }

            return null;
          }

          async function sendTelegramMedia(id, media) {
            const isVideo = media.contentType.startsWith("video/");
            const endpoint = isVideo ? "sendVideo" : "sendPhoto";
            const fieldName = isVideo ? "video" : "photo";
            const form = new FormData();

            form.append("chat_id", process.env.CHAT_ID);
            form.append(fieldName, new Blob([media.bytes], { type: media.contentType }), filenameFor(media.contentType, id));
            form.append("caption", "🎲 *Random Media Pulled From Your Drive Folder*");
            form.append("parse_mode", "Markdown");
            form.append("reply_markup", JSON.stringify({
              inline_keyboard: [[
                { text: "🔗 View Target Source", url: media.url },
                { text: "🔄 Next Random Media", callback_data: `trig:${repo}:bot_multi_media_broadcast.yml:main` }
              ]]
            }));

            return fetch(`https://api.telegram.org/bot${process.env.BOT_TOKEN}/${endpoint}`, {
              method: "POST",
              body: form
            });
          }

          async function run() {
            const response = await fetch(`https://drive.google.com/drive/folders/${folderId}`);
            const html = await response.text();
            const candidateIds = shuffle([...new Set(html.match(/[a-zA-Z0-9_-]{25,}/g) || [])]);

            if (!candidateIds.length) throw new Error("Could not parse any asset IDs from the Drive folder view.");
            console.log(`Found ${candidateIds.length} candidate Drive asset IDs.`);

            for (const id of candidateIds) {
              console.log(`Checking candidate media ID: ${id}`);
              const media = await fetchDriveMedia(id);
              if (!media) continue;

              const res = await sendTelegramMedia(id, media);
              if (!res.ok) {
                console.error("Telegram API rejected selected media:", await res.text());
                continue;
              }

              console.log("Multi-media payload pushed to Telegram.");
              return;
            }

            throw new Error("No parsed Drive asset IDs resolved to downloadable image/video content.");
          }

          run().catch((err) => {
            console.error("Multi-media broadcast execution failed:", err);
            process.exit(1);
          });
          NODE

      - name: Run Multi-Media Script File
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOLDER_ID: ${{ secrets.MULTI_MEDIA_DRIVE_FOLDER_ID }}
        run: node script.js
