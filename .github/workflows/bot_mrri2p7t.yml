.github/workflows/alt.yml
name: Alt Loop
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Send Special Content
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Use a different ID or logic here for your "different" content
          ID="1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z" 
          URL="https://drive.google.com/uc?export=download&id=$ID"
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendDocument \
          -d chat_id=$CHAT -d document="$URL" \
          -d caption="✨ This is the DIFFERENT version!" \
          -d reply_markup='{"inline_keyboard": [[{"text": "🔄 Back to Main", "callback_data": "/trigger quickerup/telegram-worker-bot-template main.yml main"}]]}'