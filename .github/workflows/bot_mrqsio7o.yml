name: Victory Ping
on:
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Production Worker
        env:
          TELEGRAM_WORKER_URL: ${{ secrets.TELEGRAM_WORKER_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "7952819982"
        run: |
          curl -s -X POST \
            "$TELEGRAM_WORKER_URL" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"$CHAT_ID\", \"text\": \"Fuck yeah it worked\"}"

