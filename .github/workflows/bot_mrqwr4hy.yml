name: Map Signal Network Trace
on:
  workflow_dispatch:
jobs:
  network-trace:
    runs-on: ubuntu-latest
    steps:
      - name: Install Network Diagnostics
        run: |
          sudo apt-get update
          sudo apt-get install -y traceroute mtr

      - name: Trace Route to Cloudflare Worker
        run: |
          echo "=== TRACING PATH TO WORKER ==="
          # Pure bash parsing to strip http:// or https:// and everything after the domain
          URL="${{ secrets.TELEGRAM_WORKER_URL }}"
          DOMAIN="${URL#*//}"
          DOMAIN="${DOMAIN%%/*}"
          echo "Target Domain: $DOMAIN"
          traceroute -m 30 "$DOMAIN"

      - name: Trace Route to Telegram API
        run: |
          echo "=== TRACING PATH TO TELEGRAM API ==="
          traceroute -m 30 api.telegram.org