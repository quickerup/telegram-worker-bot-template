name: periodic_timestamp_notification
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  notify_timestamp:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get current timestamp
        run: |
          echo "Current timestamp: $(date +"%Y-%m-%d %H:%M:%S")"

      - name: Notify Telegram on success
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"⏰ Current timestamp: $(date +"%Y-%m-%d %H:%M:%S")\"}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Workflow failed: ${{ github.workflow }}\"}"

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 ${{ github.workflow }} failed" \
            --body "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"