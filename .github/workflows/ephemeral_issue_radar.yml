name: Ephemeral Issue Radar

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Recent Issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "## 🚨 Latest GitHub Issues Radar"
          echo "Generated at $(date)"
          echo ""
          
          gh issue list --limit 20 --state open --json repository,url,title,createdAt --jq '
            .[] | "\(.repository.name): [\(.title)](\(.url)) • \(.createdAt)"
          ' || echo "No recent issues found or access limited."