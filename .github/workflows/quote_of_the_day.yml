name: Quote Of The Day
on:
  workflow_dispatch:
jobs:
  quote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and send quote
        run: |
          QUOTE=$(curl -s https://api.quotable.io/random | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"{d['content']} — {d['author']}\")")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="💭 $QUOTE"