name: Workflow Sandbox Tester
on:
  workflow_dispatch:
jobs:
  run-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Logic
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧪 *Sandbox Node Triggered Successfully!* %0A%0AThe manual trigger is working."
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown"