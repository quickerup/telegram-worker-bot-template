name: Workflow Sandbox Tester
on:
  push:
  workflow_dispatch:
    inputs:
      test_payload:
        description: 'Mock data to validate'
        required: false
        default: '{"status": "sandbox_test"}'
jobs:
  run-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Logic
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAYLOAD: ${{ github.event.inputs.test_payload }}
        run: |
          # If triggered by push, there won't be an input payload, so we use a fallback
          DATA="${PAYLOAD:-{\"status\": \"auto_push_trigger\"}}"

          if echo "$DATA" | jq . >/dev/null 2>&1; then
             OUT="✅ VALID JSON"
          else
             OUT="❌ INVALID JSON"
          fi
          
          MSG="🧪 *Sandbox Node* %0A%0A*Status:* $OUT%0A*Data:* \$DATA\"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "reply_markup={\"inline_keyboard\": [[{\"text\": \"🚀 Deploy\", \"callback_data\": \"sb_deploy\"}, {\"text\": \"🗑️ Abort\", \"callback_data\": \"sb_abort\"}]]}"