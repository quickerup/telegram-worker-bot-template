name: Deploy Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.112.0"
          command: deploy

      # Upload secrets only after a Worker version exists. Uploading secrets
      # through wrangler-action before deploy can fail when Cloudflare has no
      # latest deployed version to attach setting changes to.
      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          GHPAT: ${{ secrets.GHPAT }}
          AI_CF_TOKEN: ${{ secrets.AI_CF_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          jq -n \
            --arg telegram_bot_token "$TELEGRAM_BOT_TOKEN" \
            --arg telegram_webhook_secret "$TELEGRAM_WEBHOOK_SECRET" \
            --arg ghpat "$GHPAT" \
            --arg cloudflare_api_token "$CLOUDFLARE_API_TOKEN" \
            --arg cloudflare_account_id "$CLOUDFLARE_ACCOUNT_ID" \
            --arg ai_cf_token "$AI_CF_TOKEN" \
            --arg telegram_chat_id "$TELEGRAM_CHAT_ID" \
            '{
              TELEGRAM_BOT_TOKEN: $telegram_bot_token,
              TELEGRAM_WEBHOOK_SECRET: $telegram_webhook_secret,
              GHPAT: $ghpat,
              CLOUDFLARE_API_TOKEN: $cloudflare_api_token,
              CLOUDFLARE_ACCOUNT_ID: $cloudflare_account_id,
              AI_CF_TOKEN: $ai_cf_token,
              TELEGRAM_CHAT_ID: $telegram_chat_id
            }' | npx wrangler@4.112.0 secret bulk

      # Registers your Worker's public URL as the Telegram webhook.
      # WORKER_URL is a repo VARIABLE (not secret) — see README for how to set it.
      - name: Register Telegram webhook
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=${{ vars.WORKER_URL }}" \
            -d "secret_token=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" \
            -d "drop_pending_updates=true"
