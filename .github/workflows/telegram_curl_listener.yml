name: Telegram Curl Listener
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Start Telegram Listener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${TELEGRAM_WORKER_URL}\"}"

      - name: Listen for Curl Commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          while true
          do
            curl -s -X GET "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates" \
              -H "Content-Type: application/json" | jq '.result[] | .message.text' | grep -q "curl"
            if [ $? -eq 0 ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"Received curl command\"}"
            fi
            sleep 5
          done

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"❌ Workflow failed: ${{ github.workflow }}\"}"

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GHPAT }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 ${{ github.workflow }} failed" \
            --body "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"