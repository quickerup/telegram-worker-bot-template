name: bot_endless_loop_drive_broadcast
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
jobs:
  broadcast:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Fetch and send random image
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE_IDS=$(curl -s "https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn" | grep -oE "[a-zA-Z0-9_-]{33}")
          RANDOM_ID=$(echo "$FILE_IDS" | shuf -n 1)
          IMAGE_LINK="https://drive.google.com/uc?id=$RANDOM_ID"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"