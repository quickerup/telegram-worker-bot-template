name: Multi-Media Endless Loop Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Multi-Media Script File
        run: |
          cat << 'EOF' > script.js
          async function run() {
            try {
              // 1. Fetch the raw public folder HTML stream
              const response = await fetch("https://drive.google.com/drive/folders/1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z");
              const html = await response.text();

              // 2. Locate Google Drive's native bootstrap data block containing the actual file IDs
              const match = html.match(/init\s*=\s*function\(\)\s*\{\s*return\s*(\{.*?\})\s*\}/s) || html.match(/_itemData\s*=\s*(\{.*?\});/s);
              
              let fileIds = [];
              
              if (match) {
                // If the direct JSON block is present, extract anything that fits a strict file token format
                const tokenRegex = /"([a-zA-Z0-9_-]{33})"/g;
                let tokenMatch;
                while ((tokenMatch = tokenRegex.exec(match[1])) !== null) {
                  fileIds.push(tokenMatch[1]);
                }
              }

              // Fallback: If bootstrap data structural layout changed, use a cleaner matching filter
              if (fileIds.length === 0) {
                const globalRegex = /[a-zA-Z0-9_-]{33}/g;
                const rawMatches = html.match(globalRegex) || [];
                // Filter out obvious layout words like "logo_drive" or "color"
                fileIds = rawMatches.filter(id => !/logo|color|web|dp|icon/i.test(id));
              }

              if (fileIds.length === 0) {
                console.error("❌ Error: Could not isolate any valid media item IDs from the folder stream.");
                process.exit(1);
              }

              const uniqueIds = [...new Set(fileIds)];
              
              // 3. Random selection
              const randomId = uniqueIds[Math.floor(Math.random() * uniqueIds.length)];
              const downloadUrl = "https://drive.google.com/uc?export=download&id=" + randomId;
              console.log("Validated target media item ID:", randomId);

              // 4. Build payload matrix
              const payload = {
                chat_id: process.env.CHAT_ID,
                document: downloadUrl, 
                caption: "🎲 *Random Media Pulled From Your Live Folder*",
                parse_mode: "Markdown",
                reply_markup: {
                  inline_keyboard: [
                    [
                      { text: "🔗 View Target Source", url: "https://github.com/quickerup" },
                      { text: "🔄 Next Random Media", callback_data: "trigger_loop" }
                    ]
                  ]
                }
              };

              // 5. Fire transaction
              const res = await fetch("https://api.telegram.org/bot" + process.env.BOT_TOKEN + "/sendDocument", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              if (!res.ok) {
                const errText = await res.text();
                console.error("❌ Telegram API transaction rejected:", errText);
                process.exit(1);
              }

              console.log("🚀 Clean media payload successfully pushed to chat frame UI.");
            } catch (err) {
              console.error("❌ Fatal media loop engine execution fault:", err);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Run Safe Node Script File
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js