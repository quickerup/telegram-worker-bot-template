name: Endless Loop Drive Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Folder Webpage and Pick Random Media
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Establishing initial handshake with cloud resource target layer..."
          
          # 1. Direct pull of the raw, unauthenticated preview frame markup data stream
          FOLDER_HTML=$(curl -sL "https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn")
          
          # 2. Extract and isolate the 33-character alphanumeric asset identifiers
          FILE_IDS=$(echo "$FOLDER_HTML" | grep -oE '"[a-zA-Z0-9_-]{33}"' | tr -d '"' | sort -u)
          
          if [ -z "$FILE_IDS" ]; then
            echo "❌ Fatal Error: Could not locate public assets within the target folder tree structure."
            exit 1
          fi
          
          # 3. Apply randomized index extraction to secure exactly one target item from the list
          RANDOM_FILE_ID=$(echo "$FILE_IDS" | shuf -n 1)
          echo "Target asset verified and loaded: $RANDOM_FILE_ID"
          
          # 4. Construct the standard unauthenticated download endpoint link format
          FINAL_IMAGE_URL="https://drive.google.com/uc?export=download&id=${RANDOM_FILE_ID}"
          
          # 5. Define the exact execution string pattern mapping directly back to your worker
          CALLBACK_PAYLOAD="/trigger quickerup/telegram-worker-bot-template bot_endless_loop_drive_broadcast.yml main"
          
          # 6. Build out the structured data payload using robust JSON serialization tools
          KEYBOARD=$(jq -n --arg cb "$CALLBACK_PAYLOAD" '[[{"text": "🔄 Next Random Image", "callback_data": $cb}]]')
          
          PAYLOAD=$(jq -n \
            --arg chat "$CHAT_ID" \
            --arg photo "$FINAL_IMAGE_URL" \
            --arg caption "🎲 *Random Image Pulled From Your Drive Folder*" \
            --argjson kb "$KEYBOARD" \
            '{chat_id: $chat, photo: $photo, caption: $caption, parse_mode: "Markdown", reply_markup: { inline_keyboard: $kb }}')
          
          # 7. Disseminate the complete payload array directly to the Telegram API servers
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"