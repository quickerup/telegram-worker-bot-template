
name: Mommy

on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Image Script File
        run: |
          cat << 'EOF' > script.js
          async function run() {
            try {
              const folderUrl = "https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn";
              const response = await fetch(folderUrl);
              const html = await response.text();
              
              // Improved regex to catch Google Drive file IDs
              const regex = /"([1][a-zA-Z0-9_-]{28,})"/g;
              
              let match;
              const uniqueIds = new Set();
              while ((match = regex.exec(html)) !== null) {
                const id = match[1];
                if (id !== '1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn' && id.length > 30) {
                  uniqueIds.add(id);
                }
              }
              
              const idsArray = Array.from(uniqueIds);
              if (idsArray.length === 0) {
                console.error("❌ Error: Could not parse any asset IDs. Folder might be private or empty.");
                process.exit(1);
              }
              
              console.log(`🔥 Found ${idsArray.length} potential Mommy pics!`);
              
              let success = false;
              let attempts = 0;
              const maxAttempts = 15;
              
              while (!success && attempts < maxAttempts) {
                attempts++;
                const randomId = idsArray[Math.floor(Math.random() * idsArray.length)];
                const downloadUrl = `https://drive.google.com/uc?export=download&id=${randomId}`;
                
                const payload = {
                  chat_id: process.env.CHAT_ID,
                  photo: downloadUrl,
                  caption: "📸 *Picture of your fat naked mother!* 💦",
                  parse_mode: "Markdown",
                  reply_markup: {
                    inline_keyboard: [[{ text: "❤️ Another? Mommy's ready", callback_data: "trigger_image_loop" }]]
                  }
                };
                
                const res = await fetch(`https://api.telegram.org/bot${process.env.BOT_TOKEN}/sendPhoto`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                  success = true;
                  console.log("🚀💦 Image blasted successfully! Mommy delivered.");
                } else {
                  const errorText = await res.text();
                  console.log(`⚠️ Attempt \( {attempts}/ \){maxAttempts} failed:`, errorText);
                }
              }
              
              if (!success) {
                console.error("❌ Failed to send a valid image after max attempts.");
                process.exit(1);
              }
            } catch (err) {
              console.error("❌ Fault:", err);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Run Mommy Blaster Script
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js
