.github/workflows/transformer.yml
name: Dynamic Transformation Broadcast
on:
  workflow_dispatch:

jobs:
  transform-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
      
      - name: Create Transformer Script
        run: |
          cat << 'EOF' > script.js
          async function run() {
            try {
              // 1. Fetch Folder
              const response = await fetch("https://drive.google.com/drive/folders/1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z");
              const html = await response.text();
              const ids = [...new Set(html.match(/[a-zA-Z0-9_-]{33}/g))].filter(id => !/logo|color|web|dp|icon/i.test(id));
              const randomId = ids[Math.floor(Math.random() * ids.length)];
              const dlUrl = "https://drive.google.com/uc?export=download&id=" + randomId;

              // 2. Download local copy for processing
              const res = await fetch(dlUrl);
              const buffer = await res.arrayBuffer();
              const fs = require('fs');
              fs.writeFileSync('temp.jpg', Buffer.from(buffer));

              // 3. TRANSFORM: Add a randomized 'stamp' or watermark via ImageMagick
              const { execSync } = require('child_process');
              execSync('convert temp.jpg -gravity SouthEast -pointsize 20 -fill white -annotate +10+10 "PREMIUM CONTENT" processed.jpg');

              // 4. Send via multipart form data (the robust way)
              const FormData = require('form-data');
              const form = new FormData();
              form.append('chat_id', process.env.CHAT_ID);
              form.append('document', fs.createReadStream('processed.jpg'));
              form.append('caption', "✨ *Transformed Media Delivered*");
              form.append('parse_mode', "Markdown");

              const sendRes = await fetch("https://api.telegram.org/bot" + process.env.BOT_TOKEN + "/sendDocument", {
                method: "POST",
                body: form
              });
              
              console.log("🚀 Payload processed and pushed.");
            } catch (err) { console.error(err); process.exit(1); }
          }
          run();
          EOF
          npm install form-data
          node script.js
      - name: Run
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js