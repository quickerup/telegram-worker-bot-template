name: Main Loop
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Send Standard Content
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # The logic relies on a standard Google Drive file identifier
          ID="1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z"
          URL="https://drive.google.com/uc?export=download&id=$ID"
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendDocument \
          -d chat_id=$CHAT -d document="$URL" \
          -d caption="Standard Content Interface" \
          -d reply_markup='{"inline_keyboard": [[{"text": "✨ Switch to Special", "callback_data": "/trigger quickerup/telegram-worker-bot-template alt.yml main"}]]}'
