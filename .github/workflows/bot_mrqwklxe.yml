name: Send Telegram Message
on:
  workflow_dispatch:
    inputs:
      chat_id: { description: "Telegram chat ID" }
  push:
    branches:
      - main
jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Verify TELEGRAM_BOT_TOKEN secret
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "TELEGRAM_BOT_TOKEN secret is not set"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Send Telegram message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ github.event.inputs.chat_id }}\", \"text\": \"Test\"}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}