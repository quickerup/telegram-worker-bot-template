name: List Actions

on:
  workflow_dispatch:

jobs:
  list-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch workflows and send buttons
        env:
          GH_TOKEN: ${{ secrets.GHPAT }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          WORKFLOWS=$(gh api "repos/$REPO/actions/workflows" --jq '.workflows[] | {id, name}')

          KEYBOARD="[]"
          while read -r wf; do
            ID=$(echo "$wf" | jq -r '.id')
            NAME=$(echo "$wf" | jq -r '.name')
            KEYBOARD=$(jq -c --arg name "$NAME" --arg id "$ID" \
              '. + [[{"text": $name, "callback_data": ("wr:" + $id)}, {"text": "❌", "callback_data": ("wd:" + $id)}]]' \
              <<< "$KEYBOARD")
          done < <(echo "$WORKFLOWS" | jq -c '.')

          PAYLOAD=$(jq -n --arg chat "$CHAT_ID" --argjson kb "$KEYBOARD" \
            '{chat_id: $chat, text: "Your Actions:", reply_markup: {inline_keyboard: $kb}}')

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d "$PAYLOAD"
