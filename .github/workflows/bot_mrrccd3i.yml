name: Endless Loop Drive Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Execute Node.js Random Picker and Telegram Poster
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e '
          async function run() {
            try {
              // 1. Fetch the raw public preview page HTML stream
              const response = await fetch("https://drive.google.com/drive/folders/1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn");
              const html = await response.text();

              // 2. Use Node regex to cleanly capture all 33-character Google Drive IDs
              const regex = /[a-zA-Z0-9_-]{33}/g;
              const matches = html.match(regex);

              if (!matches || matches.length === 0) {
                console.error("❌ Error: Could not parse any asset IDs from the folder view.");
                process.exit(1);
              }

              // Deduplicate list items
              const uniqueIds = [...new Set(matches)];

              // 3. Select one asset array target completely at random using standard concat
              const randomId = uniqueIds[Math.floor(Math.random() * uniqueIds.length)];
              const imageUrl = "https://drive.google.com/uc?export=download&id=" + randomId;
              console.log("Selected target asset pointer ID:", randomId);

              // 4. Construct the two-button inline matrix payload layout
              const payload = {
                chat_id: process.env.CHAT_ID,
                photo: imageUrl,
                caption: "🎲 *Random Image Pulled From Your Drive Folder*",
                parse_mode: "Markdown",
                reply_markup: {
                  inline_keyboard: [
                    [
                      { text: "🔗 View Target Source", url: "https://github.com/quickerup" },
                      { text: "🔄 Next Random Image", callback_data: "/trigger quickerup/telegram-worker-bot-template bot_endless_loop_drive_broadcast.yml main" }
                    ]
                  ]
                }
              };

              // 5. Direct POST payload dispatch transaction straight to Telegram API servers
              const res = await fetch("https://api.telegram.org/bot" + process.env.BOT_TOKEN + "/sendPhoto", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              if (!res.ok) {
                const errText = await res.text();
                console.error("❌ Telegram API transaction rejected:", errText);
                process.exit(1);
              }

              console.log("🚀 Payload array successfully pushed to chat frame UI.");
            } catch (err) {
              console.error("❌ Fatal loop engine execution fault:", err);
              process.exit(1);
            }
          }
          run();
          '