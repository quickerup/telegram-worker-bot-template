name: Multi-Media Endless Loop Broadcast
on:
  workflow_dispatch:

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Multi-Media Script File
        run: |
          cat << 'EOF' > script.js
          async function run() {
            try {
              const response = await fetch("https://drive.google.com/drive/folders/1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z");
              const html = await response.text();
              // Google Drive file IDs typically start with 1 and contain alphanumeric chars, hyphens, underscores.
              const regex = /"([1][a-zA-Z0-9_-]{32})"/g;
              
              let match;
              const uniqueIds = new Set();
              while ((match = regex.exec(html)) !== null) {
                // Prevent matching the folder ID itself
                if (match[1] !== '1w7y-2Wl8wsKLy5c0ovZiD19h83x_Vq_z') {
                  uniqueIds.add(match[1]);
                }
              }
              
              const idsArray = Array.from(uniqueIds);
              if (idsArray.length === 0) {
                console.error("❌ Error: Could not parse any asset IDs.");
                process.exit(1);
              }
              
              const randomId = idsArray[Math.floor(Math.random() * idsArray.length)];
              const downloadUrl = "https://drive.google.com/uc?export=download&id=" + randomId;
              const payload = {
                chat_id: process.env.CHAT_ID,
                document: downloadUrl,
                caption: "🎲 *Random Media Pulled*",
                parse_mode: "Markdown",
                reply_markup: {
                  inline_keyboard: [[{ text: "🔗 Source", url: "https://github.com/quickerup" }, { text: "🔄 Next", callback_data: "trigger_loop" }]]
                }
              };
              const res = await fetch("https://api.telegram.org/bot" + process.env.BOT_TOKEN + "/sendDocument", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error(await res.text());
              console.log("🚀 Payload pushed.");
            } catch (err) {
              console.error("❌ Fault:", err);
              process.exit(1);
            }
          }
          run();
          EOF

      - name: Run Safe Node Script File
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node script.js