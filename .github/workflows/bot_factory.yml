name: Bot Factory - Provision New Bot

on:
  workflow_dispatch:
    inputs:
      new_repo_name:
        description: 'Name for the new bot repo (e.g. my-second-bot)'
        required: true
        type: string
      make_private:
        description: 'Make the new repo private?'
        required: true
        type: boolean
        default: true
      dry_run:
        description: 'Dry run? (validate only, no repo created)'
        required: false
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE THIS SECURELY:
#
# Before triggering this workflow, set these secrets in THIS repo:
#
#   NEW_BOT_TOKEN          → The Telegram bot token from @BotFather
#   NEW_BOT_CHAT_ID        → The chat ID the new bot should respond to
#   NEW_BOT_WEBHOOK_SECRET → Any random secret string (e.g. openssl rand -hex 32)
#
# These are consumed ONCE to provision the new bot, then you can delete them.
# The new repo will inherit copies of:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, GHPAT, AI_CF_TOKEN
# from this repo's secrets (they are the same platform credentials).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GHPAT }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Validate inputs
        run: |
          REPO_NAME="${{ inputs.new_repo_name }}"
          if [[ ! "$REPO_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid repo name. Use only letters, numbers, hyphens, and underscores."
            exit 1
          fi
          echo "✅ Repo name is valid: $REPO_NAME"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 DRY RUN MODE — no repo will be created."
          fi

      - name: Check all required secrets are set
        run: |
          MISSING=()
          [ -z "${{ secrets.NEW_BOT_TOKEN }}" ]          && MISSING+=("NEW_BOT_TOKEN")
          [ -z "${{ secrets.NEW_BOT_CHAT_ID }}" ]        && MISSING+=("NEW_BOT_CHAT_ID")
          [ -z "${{ secrets.NEW_BOT_WEBHOOK_SECRET }}" ] && MISSING+=("NEW_BOT_WEBHOOK_SECRET")
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]   && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]  && MISSING+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "${{ secrets.GHPAT }}" ]                  && MISSING+=("GHPAT")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            echo "Please set them in this repo's Settings → Secrets → Actions before triggering."
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: Create new repo from this template
        if: inputs.dry_run == false
        run: |
          VISIBILITY=$( [ "${{ inputs.make_private }}" = "true" ] && echo "--private" || echo "--public" )
          gh repo create "$REPO_OWNER/${{ inputs.new_repo_name }}" \
            --template "${{ github.repository }}" \
            $VISIBILITY \
            --description "Telegram GitHub Actions Bot"
          echo "✅ Created repo: $REPO_OWNER/${{ inputs.new_repo_name }}"
          # Give GitHub a moment to fully initialize the repo
          sleep 5

      - name: Copy platform secrets to new repo
        if: inputs.dry_run == false
        run: |
          NEW_REPO="$REPO_OWNER/${{ inputs.new_repo_name }}"

          gh secret set CLOUDFLARE_API_TOKEN \
            --body "${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            --repo "$NEW_REPO"

          gh secret set CLOUDFLARE_ACCOUNT_ID \
            --body "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            --repo "$NEW_REPO"

          gh secret set GHPAT \
            --body "${{ secrets.GHPAT }}" \
            --repo "$NEW_REPO"

          # Copy AI token if it exists
          if [ -n "${{ secrets.AI_CF_TOKEN }}" ]; then
            gh secret set AI_CF_TOKEN \
              --body "${{ secrets.AI_CF_TOKEN }}" \
              --repo "$NEW_REPO"
          fi

          # Copy Google Sheets webhook if it exists
          if [ -n "${{ secrets.GOOGLE_SHEETS_WEBHOOK }}" ]; then
            gh secret set GOOGLE_SHEETS_WEBHOOK \
              --body "${{ secrets.GOOGLE_SHEETS_WEBHOOK }}" \
              --repo "$NEW_REPO"
          fi

          echo "✅ Platform secrets copied."

      - name: Set bot-specific secrets on new repo
        if: inputs.dry_run == false
        run: |
          NEW_REPO="$REPO_OWNER/${{ inputs.new_repo_name }}"

          gh secret set TELEGRAM_BOT_TOKEN \
            --body "${{ secrets.NEW_BOT_TOKEN }}" \
            --repo "$NEW_REPO"

          gh secret set TELEGRAM_CHAT_ID \
            --body "${{ secrets.NEW_BOT_CHAT_ID }}" \
            --repo "$NEW_REPO"

          gh secret set TELEGRAM_WEBHOOK_SECRET \
            --body "${{ secrets.NEW_BOT_WEBHOOK_SECRET }}" \
            --repo "$NEW_REPO"

          echo "✅ Bot-specific secrets set."

      - name: Set WORKER_URL variable on new repo
        if: inputs.dry_run == false
        run: |
          NEW_REPO="$REPO_OWNER/${{ inputs.new_repo_name }}"
          WORKER_URL="https://${{ inputs.new_repo_name }}.${{ inputs.new_repo_name }}.workers.dev"

          gh variable set WORKER_URL \
            --body "$WORKER_URL" \
            --repo "$NEW_REPO"

          echo "✅ WORKER_URL set to: $WORKER_URL"
          echo "ℹ️  Note: Update WORKER_URL in the new repo's settings if Cloudflare uses a different URL."

      - name: Trigger initial deploy on new repo
        if: inputs.dry_run == false
        run: |
          NEW_REPO="$REPO_OWNER/${{ inputs.new_repo_name }}"
          # Wait a moment for secrets to propagate
          sleep 3
          gh workflow run deploy.yml --repo "$NEW_REPO"
          echo "✅ Deploy triggered on new repo."

      - name: Send Telegram notification on success
        run: |
          NEW_REPO_URL="https://github.com/$REPO_OWNER/${{ inputs.new_repo_name }}"
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "🏭 *Bot Factory Complete\!*

✅ New bot provisioned successfully\!

📦 *Repo:* [${{ inputs.new_repo_name }}]($NEW_REPO_URL)
🔒 *Private:* ${{ inputs.make_private }}
🚀 *Deploy:* Triggered and running now

⚠️ *Next steps:*
1\. Check the new repo's Actions tab to confirm deploy succeeded
2\. Remove the 3 \`NEW\_BOT\_\*\` secrets from THIS repo's settings \(they're no longer needed\)
3\. Update \`WORKER\_URL\` in the new repo if Cloudflare assigned a different domain" \
            '{chat_id: $chat_id, text: $text, parse_mode: "MarkdownV2"}')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Send Telegram notification on failure
        if: failure()
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "❌ *Bot Factory Failed\!*

Something went wrong provisioning *${{ inputs.new_repo_name }}*\.

Check the [Actions log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details\." \
            '{chat_id: $chat_id, text: $text, parse_mode: "MarkdownV2"}')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
