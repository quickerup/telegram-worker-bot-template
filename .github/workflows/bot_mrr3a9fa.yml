name: Create Sandbox Branch
on:
  push:
  workflow_dispatch:
jobs:
  branch-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Sandbox Branch
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CURRENT_REF: ${{ github.ref_name }}
        run: |
          # 1. Configure git identity
          git config --global user.name "sandbox-bot"
          git config --global user.email "sandbox@bot.internal"
          
          # 2. Cut and push the unique sandbox branch
          BRANCH_NAME="sandbox-run-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          
          # 3. Fetch all remote branches for the picker pool
          BRANCH_LIST=$(git branch -r | grep -v 'HEAD' | sed 's|[[:space:]]*origin/||g')
          
          # 4. Build out the inline keyboard JSON structure
          # Row 1: The Active/Current Branch that spawned this action
          KEYBOARD_JSON="{\"inline_keyboard\": [
            [{\"text\": \"🎯 Current Context: $CURRENT_REF\", \"callback_data\": \"select_branch:$CURRENT_REF\"}],"
          
          # Row 2 and beyond: Loop through all available branches
          FIRST=true
          for BRANCH in $BRANCH_LIST; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              KEYBOARD_JSON="${KEYBOARD_JSON}, "
            fi
            KEYBOARD_JSON="${KEYBOARD_JSON}[{\"text\": \"🌿 Branch: $BRANCH\", \"callback_data\": \"select_branch:$BRANCH\"}]"
          done
          
          KEYBOARD_JSON="${KEYBOARD_JSON}]}"
          
          MSG="🌿 *Sandbox Routing Panel* %0A%0AThe target branch \$BRANCH_NAME\ has been successfully cut upstream.%0A%0ASelect an environment context below:"
          
          # Send the layout over to your Telegram control board
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD_JSON}"