name: Endless Loop Drive Broadcast
on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: 'The Google Drive folder ID'
        required: true
        default: '1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn'
      caption:
        description: 'Caption text'
        required: false
        default: '🎲 *Random Image Pulled From Your Drive Folder*'

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Folder Webpage and Pick Random Media
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOLDER_ID: ${{ github.event.inputs.folder_id }}
          CAPTION: ${{ github.event.inputs.caption }}
        run: |
          FOLDER_HTML=$(curl -sL "https://drive.google.com/drive/folders/${FOLDER_ID}")
          FILE_IDS=$(echo "$FOLDER_HTML" | grep -oE '"[a-zA-Z0-9_-]{33}"' | tr -d '"' | sort -u)
          
          if [ -z "$FILE_IDS" ]; then
            echo "❌ Error: Could not find any valid file IDs."
            exit 1
          fi
          
          RANDOM_FILE_ID=$(echo "$FILE_IDS" | shuf -n 1)
          FINAL_IMAGE_URL="https://drive.google.com/uc?export=download&id=${RANDOM_FILE_ID}"
          
          # This sets the callback data to match our worker's new route
          KEYBOARD=$(jq -n '[[{"text": "🔄 Next Random Image", "callback_data": "loop_drive_pic"}]]')
          
          PAYLOAD=$(jq -n \
            --arg chat "$CHAT_ID" \
            --arg photo "$FINAL_IMAGE_URL" \
            --arg caption "$CAPTION" \
            --argjson kb "$KEYBOARD" \
            '{chat_id: $chat, photo: $photo, caption: $caption, parse_mode: "Markdown", reply_markup: { inline_keyboard: $kb }}')
          
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" -H "Content-Type: application/json" -d "$PAYLOAD"