name: Victory Celebration
on:
  workflow_dispatch:
jobs:
  celebrate:
    runs-on: ubuntu-latest
    steps:
      - name: Send Success Message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"🚀 12-HOUR MARATHON COMPLETE. The system is stable, the buttons are working, and the sky is the absolute limit. 👑\", \"reply_markup\": {\"inline_keyboard\": [[{\"text\": \"Hell Yeah 🔥\", \"callback_data\": \"celebrate_confirm\"}]]}}"