name: Telegram Test Button

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID to send the test button to'
        required: true
        type: string

jobs:
  send-test-button:
    runs-on: ubuntu-latest
    steps:
      - name: Send test button message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"Bot health check\", \"reply_markup\": {\"inline_keyboard\": [[{\"text\": \"Test\", \"callback_data\": \"test_ping\"}]]}}"