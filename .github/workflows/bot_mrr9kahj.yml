name: Random Drive Broadcast
on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: 'The Google Drive folder ID'
        required: true
        default: '1kZXHNWNh-e3OVfiw0K8DyE_XLGV8-Jfn'
      caption:
        description: 'Caption text'
        required: false
        default: '🎲 *Random Image Pulled From Your Drive Folder*'
      button_text:
        description: 'Button Label'
        required: false
        default: '🔗 Open Target Link'
      button_url:
        description: 'Button Target URL'
        required: false
        default: 'https://github.com/quickerup'

jobs:
  fetch-and-blast:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Folder Webpage and Pick Random Media
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOLDER_ID: ${{ github.event.inputs.folder_id }}
          CAPTION: ${{ github.event.inputs.caption }}
          B_TEXT: ${{ github.event.inputs.button_text }}
          B_URL: ${{ github.event.inputs.button_url }}
        run: |
          echo "Fetching the public Drive folder layout stream..."
          
          # 1. Pull down the raw public HTML view page of the folder
          FOLDER_HTML=$(curl -sL "https://drive.google.com/drive/folders/${FOLDER_ID}")
          
          # 2. Extract every string pattern that looks like a Google Drive file ID
          # This pulls all unique alphanumeric resource IDs found in the embedded page JSON state
          FILE_IDS=$(echo "$FOLDER_HTML" | grep -oE '"[a-zA-Z0-9_-]{33}"' | tr -d '"' | sort -u)
          
          if [ -z "$FILE_IDS" ]; then
            echo "❌ Error: Could not find any valid file IDs in the public view string matrix."
            exit 1
          fi
          
          # 3. Pick exactly one random ID from the extracted list
          RANDOM_FILE_ID=$(echo "$FILE_IDS" | shuf -n 1)
          echo "Selected File ID: $RANDOM_FILE_ID"
          
          # 4. Format the final binary target asset endpoint
          FINAL_IMAGE_URL="https://drive.google.com/uc?export=download&id=${RANDOM_FILE_ID}"
          
          # 5. Build and compile the payload
          KEYBOARD=$(jq -n --arg txt "$B_TEXT" --arg url "$B_URL" '[[{"text": $txt, "url": $url}]]')
          PAYLOAD=$(jq -n \
            --arg chat "$CHAT_ID" \
            --arg photo "$FINAL_IMAGE_URL" \
            --arg caption "$CAPTION" \
            --argjson kb "$KEYBOARD" \
            '{chat_id: $chat, photo: $photo, caption: $caption, parse_mode: "Markdown", reply_markup: { inline_keyboard: $kb }}')
          
          # 6. Ship it out
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"