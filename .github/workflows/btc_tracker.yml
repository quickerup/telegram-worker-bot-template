name: BTC Tracker
on:
  workflow_dispatch:
  schedule:
    - cron: 0 * * * *
jobs:
  track-btc:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Fetch BTC Data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESPONSE=$(curl -s -X GET "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin")
          PRICE=$(echo "$RESPONSE" | jq -r '.[0].current_price')
          PERCENTAGE_CHANGE=$(echo "$RESPONSE" | jq -r '.[0].price_change_percentage_24h')
          HIGH_24H=$(echo "$RESPONSE" | jq -r '.[0].high_24h')
          LOW_24H=$(echo "$RESPONSE" | jq -r '.[0].low_24h')
          TOTAL_VOLUME=$(echo "$RESPONSE" | jq -r '.[0].total_volume')
          MESSAGE="📊 *BTC Tracker