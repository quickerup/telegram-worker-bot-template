name: Map Signal Network Trace
on:
  workflow_dispatch:
jobs:
  network-trace:
    runs-on: ubuntu-latest
    steps:
      - name: Install Network Diagnostics
        run: |
          sudo apt-get update
          sudo apt-get install -y traceroute mtr

      - name: Trace Route to Cloudflare Worker
        run: |
          echo "=== TRACING PATH TO WORKER ==="
          # Extracts the domain from your worker secret URL and traces it
          WORKER_DOMAIN=$(echo "${{ secrets.TELEGRAM_WORKER_URL }}" | sed -e 's|^[^/]*//' -e 's|/.*$')
          traceroute -m 30 $WORKER_DOMAIN

      - name: Trace Route to Telegram API
        run: |
          echo "=== TRACING PATH TO TELEGRAM API ==="
          traceroute -m 30 api.telegram.org