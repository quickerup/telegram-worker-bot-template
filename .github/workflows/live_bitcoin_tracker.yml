name: Live Bitcoin Tracker

on:
  workflow_dispatch: # Allows manual trigger from your /actions menu
  schedule:
    - cron: '0 13 * * *' # Automatically runs every day at 9:00 AM EST (13:00 UTC)

jobs:
  fetch_btc:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Post BTC Data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Fetch live data from Phemex
          RESPONSE=$(curl -s "https://api.phemex.com/md/ticker/24hr?symbol=BTCUSD")
          
          # 2. Extract and scale values using jq
          PRICE=$(echo "$RESPONSE" | jq '.result.close / 10000')
          OPEN=$(echo "$RESPONSE" | jq '.result.open / 10000')
          HIGH=$(echo "$RESPONSE" | jq '.result.high / 10000')
          LOW=$(echo "$RESPONSE" | jq '.result.low / 10000')
          VOL=$(echo "$RESPONSE" | jq '.result.turnover / 10000')
          CHANGE=$(echo "$RESPONSE" | jq '((.result.close - .result.open) / .result.open) * 100')
          
          # Format numbers nicely using awk (avoids bc syntax errors)
          F_PRICE=$(awk "BEGIN {printf \"%''.2f\", $PRICE}")
          F_HIGH=$(awk "BEGIN {printf \"%''.2f\", $HIGH}")
          F_LOW=$(awk "BEGIN {printf \"%''.2f\", $LOW}")
          F_VOL=$(awk "BEGIN {printf \"%.2fM\", $VOL / 1000000}")
          F_CHANGE=$(awk "BEGIN {printf \"%.2f\", $CHANGE}")
          
          # Determine trend emoji
          IS_POSITIVE=$(awk "BEGIN {print ($CHANGE >= 0) ? 1 : 0}")
          if [ "$IS_POSITIVE" -eq 1 ]; then
            EMOJI="📈"
            SIGN="+"
          else
            EMOJI="📉"
            SIGN=""
          fi

          # 3. Build message text clearly separating currency symbol from shell variables
          RAW_MSG="🪙 *𝗕𝗜𝗧𝗖𝗢𝗜𝗡 (𝗕𝗧𝗖) 𝗠𝗔𝗥𝗞𝗘𝗧 𝗥𝗘𝗣𝗢𝗥𝗧*\n────────────────────\n💰 *Price:*        $"
          RAW_MSG="${RAW_MSG}${F_PRICE} USD\n${EMOJI} *24h Change:*   ${SIGN}${F_CHANGE}%\n🔥 *24h High:*     $"
          RAW_MSG="${RAW_MSG}${F_HIGH}\n🧊 *24h Low:*      $"
          RAW_MSG="${RAW_MSG}${F_LOW}\n📊 *24h Volume:*   $"
          RAW_MSG="${RAW_MSG}${F_VOL}\n────────────────────\n🕒 _Updated via GitHub Actions_"

          # 4. Strictly escape characters for Telegram's MarkdownV2 (. , - _ ( ) +)
          ESC_MESSAGE=$(echo -e "$RAW_MSG" | sed -r 's/([\.\,\-\_\(\)\+])/\\\1/g')

          # 5. Send it to your Telegram Bot
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"$ESC_MESSAGE\", \"parse_mode\": \"MarkdownV2\"}"
