name: Live Bitcoin Tracker

on:
  workflow_dispatch: # Allows manual trigger from your /actions menu
  schedule:
    - cron: '0 13 * * *' # Automatically runs every day at 9:00 AM EST (13:00 UTC)

jobs:
  fetch_btc:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Post BTC Data via One-Liner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESPONSE=$(curl -s "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin") && PRICE=$(echo "$RESPONSE" | jq -r '.[0].current_price') && CHANGE=$(echo "$RESPONSE" | jq -r '.[0].price_change_percentage_24h') && HIGH=$(echo "$RESPONSE" | jq -r '.[0].high_24h') && LOW=$(echo "$RESPONSE" | jq -r '.[0].low_24h') && VOL=$(echo "$RESPONSE" | jq -r '.[0].total_volume') && F_PRICE=$(printf "%'.2f" "$PRICE") && F_HIGH=$(printf "%'.2f" "$HIGH") && F_LOW=$(printf "%'.2f" "$LOW") && F_VOL=$(echo "scale=1; $VOL / 1000000000" | bc | awk '{printf "%.1fB", $0}') && F_CHANGE=$(printf "%.2f" "$CHANGE") && if (( $(echo "$CHANGE >= 0" | bc -l) )); then EMOJI="рҹ“Ҳ"; SIGN="+"; else EMOJI="рҹ“ү"; SIGN=""; fi && RAW_MSG=$(printf "рҹӘҷ *рқ—•рқ—ңрқ—§рқ—–рқ—ўрқ—ңрқ—Ў (рқ—•рқ—§рқ—–) рқ— рқ—”рқ—Ҙрқ—һрқ—ҳрқ—§ рқ—Ҙрқ—ҳрқ—Јрқ—ўрқ—Ҙрқ—§*\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ’° *Price:*        \$%s USD\n%s *24h Change:*   %s%s%%\nрҹ”Ҙ *24h High:*     \$%s\nрҹ§Ҡ *24h Low:*      \$%s\nрҹ“Ҡ *24h Volume:*   \$%s\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ•’ _Updated via GitHub Actions_" "$F_PRICE" "$EMOJI" "$SIGN" "$F_CHANGE" "$F_HIGH" "$F_LOW" "$F_VOL") && ESC_MESSAGE=$(echo "$RAW_MSG" | sed -r 's/([\.\,\-\_\(\)\+])/\\\1/g' | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g') && curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"$ESC_MESSAGE\", \"parse_mode\": \"MarkdownV2\"}"