name: Live Bitcoin Tracker

on:
  workflow_dispatch:

jobs:
  fetch_btc:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Post BTC Data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PRICE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd" | jq -r '.bitcoin.usd') && curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"🪙 <b>Bitcoin Price Update</b>\n💰 <b>Current Price:</b> \$${PRICE} USD\", \"parse_mode\": \"HTML\"}"