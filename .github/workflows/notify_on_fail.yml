name: Global Failure Notification
on:
  workflow_run:
    workflows: ["*"]
    types: [completed]
jobs:
  notify-failure:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send Telegram Alert and Create Issue
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          REPO: ${{ github.repository }}
          URL: ${{ github.event.workflow_run.html_url }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Send Telegram Alert
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${CHAT_ID}\",
              \"text\": \"❌ <b>GitHub Action Failed!</b>\n\n<b>Repo:</b> ${REPO}\n<b>Workflow:</b> ${WORKFLOW_NAME}\n<a href='${URL}'>View Failed Run</a>\",
              \"parse_mode\": \"HTML\",
              \"disable_web_page_preview\": true
            }"

          # 2. Manage GitHub Issue
          gh label create "automatic issue report" --color "E99695" --description "Automatically created by failure notification workflow" --force || true
          
          # Search for an existing open issue for this specific workflow
          EXISTING_ISSUE=$(gh issue list --label "automatic issue report" --state open --search "in:title ${WORKFLOW_NAME}" --json number --jq '.[0].number')
          
          BODY="### ❌ Workflow Failure: ${WORKFLOW_NAME}
          
          **Branch:** \`${BRANCH}\`
          **Commit:** \`${COMMIT_SHA}\`
          **Run Details:** [View Failed Run logs](${URL})"

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Found existing open issue #${EXISTING_ISSUE}. Adding a comment instead of creating a new issue."
            gh issue comment "$EXISTING_ISSUE" --body "$BODY"
          else
            echo "No open issue found. Creating a new one."
            gh issue create \
              --title "🚨 Failure in workflow: ${WORKFLOW_NAME}" \
              --body "$BODY" \
              --label "automatic issue report"
          fi
