name: Global Failure Issue Reporter

on:
  workflow_run:
    workflows:
      - Deploy Telegram Bot
      - List Actions
    types: [completed]

permissions:
  issues: write
  actions: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Create issue for failed workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "automatic issue report" \
            --color "E99695" \
            --description "Automatically created for failed GitHub Actions runs" \
            --force

          cat > issue-body.md <<ISSUE_BODY
          ### ❌ GitHub Actions failure

          A workflow run failed and needs attention.

          - **Repository:** \`${REPO}\`
          - **Workflow:** \`${WORKFLOW_NAME}\`
          - **Run:** [#${RUN_NUMBER}](${RUN_URL})
          - **Run ID:** \`${RUN_ID}\`
          - **Branch:** \`${BRANCH}\`
          - **Commit:** \`${COMMIT_SHA}\`
          - **Actor:** \`${ACTOR}\`

          Review the failed run logs and close this issue when the failure is resolved.
          ISSUE_BODY

          gh issue create \
            --title "🚨 Action failure: ${WORKFLOW_NAME} run #${RUN_NUMBER}" \
            --body-file issue-body.md \
            --label "automatic issue report"
