name: Telegram Command Runner
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  wait-for-command:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for command
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X GET "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates" \
            -H "Content-Type: application/json" \
            -d '{"offset": 0}' > updates.json
          while [ $(jq '.result[] | select(.message.text != null)' updates.json | wc -l) -eq 0 ]; do
            sleep 1
            curl -s -X GET "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates" \
              -H "Content-Type: application/json" \
              -d '{"offset": 0}' > updates.json
          done
          MESSAGE=$(jq -r '.result[] | select(.message.text != null) | .message.text' updates.json)
          echo "Received command: $MESSAGE"
      - name: Run