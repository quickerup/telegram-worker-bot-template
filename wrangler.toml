name = "telegram-worker-bot-template"
main = "src/index.js"
compatibility_date = "2024-09-25"

# Secrets are NOT set here. They're pushed in by the GitHub Actions
# workflow (.github/workflows/deploy.yml) from your repo secrets:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_SECRET
#
# For local dev, create a .dev.vars file (gitignored) with:
#   TELEGRAM_BOT_TOKEN=xxxx
#   TELEGRAM_WEBHOOK_SECRET=xxxx

[ai]
binding = "AI"
